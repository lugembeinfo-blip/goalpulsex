name: goalpulsex

description: "GoalPulseX Live Football Scores App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP Requests
  http: ^1.2.0

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10

  # UI
  google_fonts: ^6.2.1

  # SVG Logos
  flutter_svg: ^2.0.10+1

  # Cached Images
  cached_network_image: ^3.3.1

  # Loading Animations
  shimmer: ^3.0.0

  # Icons
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/